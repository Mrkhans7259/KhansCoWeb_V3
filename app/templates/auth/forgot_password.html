{% extends "shared/base.html" %}

{% block body %}
<div class="auth-page">
    <div class="auth-shell">
        <div class="brand-panel">
            <div class="logo-box">K&C</div>
            <h1>Password Recovery</h1>
            <h2>Secure Access</h2>
            <p>Reset your password securely and continue accessing your compliance dashboard.</p>
        </div>

        <div class="form-panel">
            <h2>Forgot Password</h2>
            <p class="muted">Enter your registered email address</p>

            <form class="form">
                <label>Email Address</label>
                <input type="email" placeholder="Enter registered email">
                <button type="button">Send Reset Link</button>

                <div class="bottom-link">
                    <a href="{{ url_for('auth.login') }}">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
