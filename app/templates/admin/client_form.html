{% extends "shared/base.html" %}

{% block body %}
<div class="app-layout">
    {% include "shared/admin_sidebar.html" %}

    <main class="main">
        <header class="topbar">
            <div>
                <h1>Add Client</h1>
                <p>Create a new client master record</p>
            </div>
            <a class="top-action secondary" href="{{ url_for('admin.clients') }}">Back</a>
        </header>

        <section class="panel">
            <form method="POST" class="client-form">
                <div class="grid-2">
                    <div><label>Business / Trade Name</label><input name="business_name" required></div>
                    <div><label>Client Name</label><input name="client_name" required></div>
                    <div><label>Mobile</label><input name="mobile"></div>
                    <div><label>Email</label><input type="email" name="email"></div>
                    <div><label>GSTIN</label><input name="gstin"></div>
                    <div><label>PAN</label><input name="pan"></div>
                    <div><label>Constitution</label><input name="constitution" placeholder="Proprietor / Firm / Company"></div>
                    <div><label>Registration Type</label><input name="registration_type" placeholder="Regular / Composition"></div>
                    <div><label>Return Frequency</label><input name="return_frequency" placeholder="Monthly / Quarterly"></div>
                    <div><label>Assigned Staff</label><input name="assigned_staff"></div>
                    <div><label>City</label><input name="city"></div>
                    <div><label>State</label><input name="state"></div>
                    <div><label>Pincode</label><input name="pincode"></div>
                    <div>
                        <label>Status</label>
                        <select name="status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <label>Address</label>
                <textarea name="address" rows="4"></textarea>

                <button type="submit" class="save-btn">Save Client</button>
            </form>
        </section>
    </main>
</div>
{% endblock %}
